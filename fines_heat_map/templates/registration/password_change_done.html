{% extends "base.html" %}

{% block title %}Contraseña Cambiada - FinEs Mapa Interactivo{% endblock title %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-160px)] px-4 py-12">
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md text-center" role="status"
        aria-labelledby="password-changed-heading">
        <h1 id="password-changed-heading" class="text-3xl font-bold text-green-700 mb-6">¡Contraseña Cambiada!</h1>

        <p class="text-gray-700 mb-6">Tu contraseña ha sido cambiada exitosamente.</p>

        <a href="{% url 'map_home' %}"
            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Volver a la página principal
        </a>
    </div>
</div>
{% endblock content %}
