    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script>
        // Inicializar el mapa
        const map = L.map('map').setView([-34.6037, -58.3816], 13);

        // Añadir tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Capas
        let heatLayer;
        let markers = [];
        let heatPoints = [];

        // Cargar datos guardados
        function loadSavedPoints() {
            const saved = localStorage.getItem('heatmapPoints');
            if (saved) {
                const data = JSON.parse(saved);
                heatPoints = data.heat || [];
                data.markers.forEach(m => addMarkerToMap(m.lat, m.lng, m.name, false));
                updateHeatmap();
            } else {
                // Puntos iniciales
                const initial = [
                    [-34.939123, -57.969629, 0.8],
                    [-34.909726, -57.891654, 0.6],
                    [-34.913797, -58.971664, 0.9],
                    [-34.912200, -58.930800, 0.7],
                    [-34.961501, -58.938500, 0.5]
                ];
                heatPoints = initial;
                addMarkerToMap(-34.939123, -57.969629, "Casa de Tincho", false);
            }
            updateHeatmap();
        }

        // Guardar en localStorage
        function savePoints() {
            const data = {
                markers: markers.map(m => ({ lat: m.latlng.lat, lng: m.latlng.lng, name: m.name })),
                heat: heatPoints
            };
            localStorage.setItem('heatmapPoints', JSON.stringify(data));
        }

        // Actualizar heatmap
        function updateHeatmap() {
            if (heatLayer) map.removeLayer(heatLayer);
            heatLayer = L.heatLayer(heatPoints, {
                radius: 95,
                blur: 1,
                maxZoom: 17,
                max: 1.0,
                gradient: { 0.1: 'red', 0.4: 'blue', 0.65: 'lime' }
            }).addTo(map);
        }

        // Añadir marcador al mapa
        function addMarkerToMap(lat, lng, name, save = true) {
            const marker = L.marker([lat, lng]).addTo(map);
            marker.bindPopup(`<b>${name}</b><br>${lat.toFixed(6)}, ${lng.toFixed(6)}`).openPopup();
            markers.push({ marker, latlng: { lat, lng }, name });
            if (save) {
                heatPoints.push([lat, lng, 0.7]); // Intensidad fija
                updateHeatmap();
                savePoints();
            }
            return marker;
        }

        // Variables para el modal (COMENTADAS TEMPORALMENTE - Los datos vendrán de la base de datos)
        let pendingLatLng = null;

        // Confirmar adición (COMENTADO TEMPORALMENTE - Los datos vendrán de la base de datos)

        // };

        // Cancelar (COMENTADO TEMPORALMENTE - Los datos vendrán de la base de datos)
        // cancelBtn.onclick = function() {

        // };

        // Cerrar con Escape (COMENTADO TEMPORALMENTE - Los datos vendrán de la base de datos)

        //     if (e.key === 'Escape') {
        //         modal.classList.add('hidden');
        //         modal.classList.remove('flex');
        //     }
        // });

        // Botón toggle heatmap
        let isHeatmapActive = true;
        const toggleButton = document.getElementById('toggleHeatmap');
        toggleButton.addEventListener('click', function() {
            if (isHeatmapActive) {
                map.removeLayer(heatLayer);
                toggleButton.textContent = 'Activar Heatmap';
                isHeatmapActive = false;
            } else {
                updateHeatmap();
                toggleButton.textContent = 'Desactivar Heatmap';
                isHeatmapActive = true;
            }
        });

        // Cargar puntos al inicio
        loadSavedPoints();

        // Marcador inicial (si no hay guardados)
        if (markers.length === 0) {
            addMarkerToMap(-34.939123, -57.969629, "Casa de Tincho", false);
        }
