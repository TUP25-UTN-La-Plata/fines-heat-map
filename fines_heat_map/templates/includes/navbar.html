<header class="bg-blue-600 text-white shadow-md" role="banner">
    <nav class="container mx-1 px-1 py-3 flex justify-between items-center" aria-label="Navegación principal">
        <a href="{% url 'home' %}" class="text-xl font-bold tracking-tight flex items-center space-x-4"
            aria-label="Inicio del FinEs Mapa Interactivo">
            {% load static %}
            <img src="{% static 'img/texto_transparente.png' %}" alt="FinEs Mapa de Calor" class="h-8 w-auto">
            <span class="text-white">Plan FinEs - Mapa Interactivo</span>
        </a>

        <!-- Botón de hamburguesa para móviles -->
        <button id="menu-toggle" class="md:hidden p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-white"
            aria-controls="main-menu" aria-expanded="false" aria-label="Abrir menú de navegación">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>

        <div id="main-menu"
            class="hidden md:flex flex-col md:flex-row md:items-center md:space-x-6 absolute md:static top-16 left-0 w-full md:w-auto bg-blue-600 md:bg-transparent shadow-lg md:shadow-none py-4 md:py-0 z-10">
            <ul class="flex flex-col md:flex-row md:space-x-6 space-y-2 md:space-y-0 px-4 md:px-0">
                <li><a href="{% url 'home' %}"
                        class="block py-2 px-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-white"
                        aria-current="page">Mapa</a></li>
                <li><a href="{% url 'instituciones:lista_instituciones' %}"
                        class="block py-2 px-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-white">Instituciones</a>
                </li>
                {% if user.is_authenticated %}
                <li><a href="{% url 'admin:index' %}"
                        class="block py-2 px-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-white">Administración</a>
                </li>
                <li>
                    <form method="post" action="{% url 'admin:logout' %}" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit"
                            class="block py-2 px-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-white bg-transparent border-none text-white cursor-pointer w-full text-left">Cerrar
                            sesión</button>
                    </form>
                </li>
                {% else %}
                <li><a href="{% url 'admin:login' %}"
                        class="block py-2 px-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-white">Iniciar
                        sesión</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </nav>
</header>
<script> document.addEventListener('DOMContentLoaded', function () {
        const menuToggle = document.getElementById('menu-toggle'); const mainMenu = document.getElementById('main-menu'); menuToggle.addEventListener('click', function () { const expanded = this.getAttribute('aria-expanded') === 'true' || false; this.setAttribute('aria-expanded', !expanded); mainMenu.classList.toggle('hidden'); }); // Cerrar menú al hacer clic fuera en móvil 
        document.addEventListener('click', function (event) { const isClickInside = mainMenu.contains(event.target) || menuToggle.contains(event.target); if (!isClickInside && !mainMenu.classList.contains('hidden') && window.innerWidth < 768) { menuToggle.setAttribute('aria-expanded', 'false'); mainMenu.classList.add('hidden'); } }); // Cerrar menú al cambiar de tamaño de ventana a desktop 
        window.addEventListener('resize', function () {
            if (window.innerWidth >= 768) {
                mainMenu.classList.remove('hidden'); menuToggle.setAttribute('aria-expanded', 'false'); // Resetear estado 
            } else { mainMenu.classList.add('hidden'); }
        });
    }); </script>
